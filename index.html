<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no,viewport-fit=cover">
<title>こどもサイズ予測</title>
<link rel="manifest" href="manifest.json">
<link rel="icon" href="icon.svg" type="image/svg+xml">
<link rel="apple-touch-icon" href="icon.svg">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="サイズ予測">
<meta name="theme-color" content="#7c6ff7">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html{font-size:16px;--child-color:#7c6ff7}
body{font-family:-apple-system,BlinkMacSystemFont,'Hiragino Sans','Noto Sans JP',sans-serif;background:#faf5ff;color:#2d3748;min-height:100vh;max-width:480px;margin:0 auto}

.hdr{background:#fff;color:#2d3748;padding:14px 16px;display:flex;align-items:center;gap:10px;position:sticky;top:0;z-index:100;box-shadow:0 2px 8px rgba(0,0,0,.08)}
.hdr h1{font-size:1.05rem;font-weight:700;flex:1;letter-spacing:.03em;text-align:center}
.hdr .back{background:none;border:none;color:inherit;font-size:1.6rem;cursor:pointer;padding:2px 6px;line-height:1}
.hdr .act{background:#f0ebff;border:none;color:#7c6ff7;border-radius:20px;padding:6px 14px;font-size:.82rem;cursor:pointer;font-family:inherit;white-space:nowrap;font-weight:600}
.hdr.child-hdr .act{background:rgba(255,255,255,.25);color:#fff}

#loading{display:flex;align-items:center;justify-content:center;height:100vh;font-size:1rem;color:#aaa}
.screen{display:none}
.screen.active{display:block}

.home-body{padding:16px}
.child-card{background:#fff;border-radius:20px;padding:16px;margin-bottom:12px;box-shadow:0 3px 12px rgba(0,0,0,.07);cursor:pointer;display:flex;align-items:center;gap:14px;transition:transform .15s;border-left:4px solid #e0d9ff}
.child-card:active{transform:scale(.97)}
.child-avatar{width:52px;height:52px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:1.7rem;flex-shrink:0}
.child-info{flex:1;min-width:0}
.child-name{font-size:1rem;font-weight:700;margin-bottom:2px}
.child-age{font-size:.8rem;color:#999}
.child-size{font-size:.82rem;font-weight:600;margin-top:6px;display:flex;flex-wrap:wrap;gap:4px 10px}

.tabs{display:flex;background:#fff;border-bottom:2px solid #f0f0f0;position:sticky;top:52px;z-index:90}
.tab{flex:1;padding:12px 8px;border:none;background:none;font-family:inherit;font-size:.88rem;color:#bbb;cursor:pointer;border-bottom:3px solid transparent;transition:all .2s;font-weight:600}
.tab.active{color:var(--child-color);border-bottom-color:var(--child-color)}
.tab-body{padding:16px}

#current-size-bar{padding:10px 16px;display:flex;flex-wrap:wrap;gap:6px 12px;font-size:.82rem;font-weight:600;background:#fff;border-bottom:1px solid #f0f0f0}
#current-size-bar span{color:var(--child-color)}
#current-size-bar .csb-label{color:#aaa;font-weight:400;font-size:.75rem;margin-right:2px}

.closet-cat{margin-bottom:20px}
.closet-cat-title{font-size:.88rem;font-weight:700;color:#555;margin-bottom:10px;display:flex;align-items:center;gap:6px}
.closet-sizes{display:flex;flex-wrap:wrap;gap:8px}
.closet-chip{display:flex;flex-direction:column;align-items:center;background:#fff;border-radius:12px;padding:8px 10px;min-width:52px;box-shadow:0 1px 4px rgba(0,0,0,.07);gap:4px}
.closet-chip-size{font-size:.78rem;color:#888;font-weight:600}
.closet-chip-ctrl{display:flex;align-items:center;gap:4px}
.closet-chip-btn{width:24px;height:24px;border-radius:6px;border:1.5px solid #e0d9ff;background:#fff;font-size:.9rem;cursor:pointer;display:flex;align-items:center;justify-content:center;font-weight:700;color:var(--child-color);line-height:1}
.closet-chip-count{min-width:22px;text-align:center;font-size:.9rem;font-weight:700;color:var(--child-color)}
.closet-memo{width:100%;margin-top:4px;padding:4px 6px;border:1px solid #e8e4ff;border-radius:6px;font-size:.72rem;font-family:inherit;color:#555;outline:none;background:#faf8ff}

.icon-grid{display:flex;flex-wrap:wrap;gap:6px;margin-top:6px}
.icon-btn{width:42px;height:42px;border-radius:12px;border:2px solid #eee;background:#fafafa;font-size:1.3rem;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all .15s}
.icon-btn.selected{border-color:#7c6ff7;background:#f0ebff;transform:scale(1.1)}
.color-grid{display:flex;gap:8px;margin-top:6px;flex-wrap:wrap}
.color-dot{width:30px;height:30px;border-radius:50%;border:3px solid transparent;cursor:pointer;transition:all .15s}
.color-dot.selected{outline:3px solid #7c6ff7;outline-offset:2px;transform:scale(1.15)}

.predict-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:20px}
.predict-card{background:#fff;border-radius:14px;padding:10px 12px 12px;box-shadow:0 2px 8px rgba(0,0,0,.07);border-top:3px solid #e8e4ff;position:relative;overflow:hidden}
.predict-card.summer{border-top-color:#ff9f43}
.predict-card.winter{border-top-color:#54a0ff}
.predict-card.year1{border-top-color:var(--child-color)}
.predict-card.year2{border-top-color:#a29bfe}
.predict-icon{display:none}
.predict-label{font-size:.82rem;font-weight:700;color:#444;margin-bottom:2px}
.predict-date{font-size:.67rem;color:#bbb;margin-bottom:6px}
.predict-height{font-size:.8rem;font-weight:600;color:#666;margin-bottom:6px}
.predict-size{display:flex;gap:4px;flex-wrap:wrap}
.predict-size span{font-size:.76rem;background:#f0f2ff;color:var(--child-color);padding:3px 8px;border-radius:20px;font-weight:700;letter-spacing:.02em}

.section-title{font-size:.88rem;font-weight:700;color:#555;margin:0 0 10px;padding:0 0 6px;border-bottom:2px solid #e8e4ff;letter-spacing:.03em}
.brand-section{margin-bottom:22px}
.scroll-table{overflow-x:auto;-webkit-overflow-scrolling:touch}
table{width:100%;border-collapse:collapse;font-size:.78rem;white-space:nowrap}
th{padding:8px;text-align:center;background:#f0f2ff;font-weight:700;color:#555}
th:first-child{text-align:left}
td{padding:8px 6px;border-bottom:1px solid #f0f2ff;text-align:center}
td:first-child{text-align:left;font-weight:600}
.td-size{font-weight:700;color:var(--child-color)}
.td-note{color:#aaa;font-size:.72rem;text-align:left}

.measure-card{background:#fff;border-radius:12px;padding:14px;margin-bottom:8px;box-shadow:0 1px 4px rgba(0,0,0,.06);display:flex;align-items:flex-start;gap:12px;cursor:pointer}
.measure-card:active{background:#fafafa}
.measure-date{font-size:.78rem;font-weight:700;color:var(--child-color);min-width:70px}
.measure-data{flex:1}
.measure-main{font-size:.9rem;font-weight:600;margin-bottom:2px}
.measure-sub{font-size:.78rem;color:#888}
.measure-note{font-size:.78rem;color:#666;margin-top:5px;padding:5px 8px;background:#f8f7ff;border-radius:6px}

.fab{position:fixed;bottom:calc(24px + env(safe-area-inset-bottom));right:20px;width:56px;height:56px;border-radius:50%;background:var(--child-color);color:#fff;border:none;font-size:1.6rem;cursor:pointer;box-shadow:0 4px 18px rgba(0,0,0,.2);display:flex;align-items:center;justify-content:center;z-index:200;transition:all .3s}
.fab:active{transform:scale(.88)}

.brand-edit-row{background:#fff;border-radius:12px;padding:14px;margin-bottom:10px;box-shadow:0 1px 4px rgba(0,0,0,.06)}
.brand-edit-name{font-weight:700;font-size:.9rem;margin-bottom:10px;color:#2d3748}
.offset-control{display:flex;align-items:center;gap:8px;margin-bottom:10px}
.offset-label{font-size:.82rem;color:#666;flex:1}
.offset-btn{width:34px;height:34px;border-radius:8px;border:1.5px solid #ddd;background:#fff;font-size:1.1rem;cursor:pointer;display:flex;align-items:center;justify-content:center;font-weight:700}
.offset-val{min-width:38px;text-align:center;font-weight:700;color:var(--child-color);font-size:.95rem}
.save-brand-btn{background:var(--child-color);color:#fff;border:none;border-radius:8px;padding:7px 16px;font-size:.8rem;cursor:pointer;font-family:inherit;margin-top:4px}

.modal-overlay{display:none;position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,.5);z-index:300;align-items:flex-end}
.modal-overlay.open{display:flex}
.modal{background:#fff;border-radius:20px 20px 0 0;padding:20px 16px calc(36px + env(safe-area-inset-bottom));width:100%;max-height:90vh;overflow-y:auto;-webkit-overflow-scrolling:touch}
.modal-title{font-size:1rem;font-weight:700;margin-bottom:16px;text-align:center}
.form-group{margin-bottom:14px}
.form-label{font-size:.82rem;font-weight:600;color:#555;margin-bottom:5px;display:block}
.form-input{width:100%;padding:11px 12px;border:1.5px solid #ddd;border-radius:10px;font-size:1rem;font-family:inherit;outline:none;transition:border-color .2s;-webkit-appearance:none;appearance:none;background:#fff}
.form-input:focus{border-color:var(--child-color)}
.form-row{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.btn-primary{width:100%;padding:14px;background:linear-gradient(135deg,#7c6ff7,#a29bfe);color:#fff;border:none;border-radius:14px;font-size:1rem;font-weight:700;cursor:pointer;font-family:inherit;margin-top:8px;box-shadow:0 3px 10px rgba(124,111,247,.3)}
.btn-secondary{width:100%;padding:12px;background:#f0ebff;color:#7c6ff7;border:none;border-radius:14px;font-size:.9rem;font-weight:600;cursor:pointer;font-family:inherit;margin-top:6px}
.btn-danger{width:100%;padding:12px;background:#fff0f0;color:#e53e3e;border:none;border-radius:14px;font-size:.9rem;font-weight:600;cursor:pointer;font-family:inherit;margin-top:6px}

.no-data{text-align:center;padding:48px 20px;color:#aaa;font-size:.9rem;line-height:1.8}
#toast{position:fixed;bottom:calc(90px + env(safe-area-inset-bottom));left:50%;transform:translateX(-50%);background:#2d3748;color:#fff;padding:10px 20px;border-radius:20px;font-size:.85rem;z-index:500;opacity:0;transition:opacity .3s;pointer-events:none;white-space:nowrap}
#toast.show{opacity:1}

.bpc-card{background:#fff;border-radius:14px;padding:13px 14px;margin-bottom:8px;box-shadow:0 2px 6px rgba(0,0,0,.06)}
.bpc-name{font-size:.84rem;font-weight:700;color:var(--child-color);margin-bottom:8px;padding-bottom:7px;border-bottom:1px solid #eeebff}
.bpc-row{display:flex;align-items:center;padding:6px 0;border-bottom:1px solid #f5f4ff}
.bpc-row:last-child{border-bottom:none;padding-bottom:0}
.bpc-period{font-size:.76rem;color:#aaa;min-width:54px;font-weight:600}
.bpc-sizes{font-size:.85rem;color:#2d3748;font-weight:500}
.bpc-sizes b{color:var(--child-color)}
</style>
</head>
<body>

<div id="loading">読み込み中…</div>

<!-- LOGIN -->
<div id="screen-login" class="screen" style="display:none;justify-content:center;align-items:center;min-height:100vh">
  <div style="display:flex;flex-direction:column;align-items:center;justify-content:center;width:100%;padding:32px 24px;text-align:center">
    <div style="font-size:3rem;margin-bottom:16px">👕</div>
    <h1 style="font-size:1.4rem;font-weight:700;color:#2d3748;margin-bottom:8px">こどもサイズ予測</h1>
    <p style="font-size:.88rem;color:#888;margin-bottom:40px;line-height:1.7">Googleアカウントでログインして<br>お子さまの成長記録を始めましょう</p>
    <button onclick="signInWithGoogle()" style="display:flex;align-items:center;gap:10px;padding:14px 28px;background:#fff;border:1.5px solid #ddd;border-radius:10px;font-size:.95rem;font-weight:600;color:#444;cursor:pointer;box-shadow:0 2px 8px rgba(0,0,0,.08)">
      <svg width="20" height="20" viewBox="0 0 48 48"><path fill="#EA4335" d="M24 9.5c3.54 0 6.71 1.22 9.21 3.6l6.85-6.85C35.9 2.38 30.47 0 24 0 14.62 0 6.51 5.38 2.56 13.22l7.98 6.19C12.43 13.72 17.74 9.5 24 9.5z"/><path fill="#4285F4" d="M46.98 24.55c0-1.57-.15-3.09-.38-4.55H24v9.02h12.94c-.58 2.96-2.26 5.48-4.78 7.18l7.73 6c4.51-4.18 7.09-10.36 7.09-17.65z"/><path fill="#FBBC05" d="M10.53 28.59c-.48-1.45-.76-2.99-.76-4.59s.27-3.14.76-4.59l-7.98-6.19C.92 16.46 0 20.12 0 24c0 3.88.92 7.54 2.56 10.78l7.97-6.19z"/><path fill="#34A853" d="M24 48c6.48 0 11.93-2.13 15.89-5.81l-7.73-6c-2.18 1.48-4.96 2.31-8.16 2.31-6.26 0-11.57-4.22-13.47-9.91l-7.98 6.19C6.51 42.62 14.62 48 24 48z"/></svg>
      Googleでログイン
    </button>
  </div>
</div>

<!-- HOME -->
<div id="screen-home" class="screen">
  <div class="hdr">
    <button class="act" onclick="signOut()" style="font-size:.75rem;padding:6px 10px;opacity:.8">ログアウト</button>
    <h1>こどもサイズ予測</h1>
    <button class="act" onclick="openChildModal()">＋ 追加</button>
  </div>
  <div class="home-body">
    <div id="children-list"></div>
    <div class="no-data" id="home-no-data" style="display:none">子どもを追加してください</div>
  </div>
</div>

<!-- CHILD DETAIL -->
<div id="screen-child" class="screen">
  <div class="hdr child-hdr" id="child-hdr">
    <button class="back" onclick="showHome()">‹</button>
    <h1 id="child-hdr-name"></h1>
    <button class="act" onclick="openChildModal(currentChildId)">編集</button>
  </div>
  <div id="current-size-bar"></div>
  <div class="tabs" id="child-tabs">
    <button class="tab active" id="tab-btn-predict" onclick="showTab('predict')">予測</button>
    <button class="tab" id="tab-btn-history" onclick="showTab('history')">記録</button>
    <button class="tab" id="tab-btn-closet" onclick="showTab('closet')">クローゼット</button>
    <button class="tab" id="tab-btn-brands" onclick="showTab('brands')">ブランド</button>
  </div>
  <div class="tab-body" id="tab-predict"></div>
  <div class="tab-body" id="tab-history" style="display:none"></div>
  <div class="tab-body" id="tab-closet" style="display:none"></div>
  <div class="tab-body" id="tab-brands" style="display:none"></div>
  <button class="fab" id="fab-btn" onclick="openMeasureModal()">＋</button>
</div>

<!-- MODAL: 子ども -->
<div class="modal-overlay" id="child-modal">
  <div class="modal">
    <div class="modal-title" id="child-modal-title">子どもを追加</div>
    <div class="form-group">
      <label class="form-label">名前</label>
      <input class="form-input" id="f-child-name" type="text" placeholder="例：たろう">
    </div>
    <div class="form-group">
      <label class="form-label">生年月日</label>
      <div class="form-row" style="grid-template-columns:2fr 1fr 1fr">
        <select class="form-input" id="f-child-birth-y">
          <option value="">年</option>
        </select>
        <select class="form-input" id="f-child-birth-m">
          <option value="">月</option>
          <option>1</option><option>2</option><option>3</option><option>4</option>
          <option>5</option><option>6</option><option>7</option><option>8</option>
          <option>9</option><option>10</option><option>11</option><option>12</option>
        </select>
        <select class="form-input" id="f-child-birth-d">
          <option value="">日</option>
        </select>
      </div>
    </div>
    <div class="form-group">
      <label class="form-label">性別（任意）</label>
      <select class="form-input" id="f-child-gender">
        <option value="不明">選択なし</option>
        <option value="男">男の子</option>
        <option value="女">女の子</option>
      </select>
    </div>
    <div class="form-group">
      <label class="form-label">アイコン</label>
      <div id="icon-picker" class="icon-grid"></div>
    </div>
    <div class="form-group">
      <label class="form-label">カラー</label>
      <div id="color-picker" class="color-grid"></div>
    </div>
    <button class="btn-primary" onclick="saveChild()">保存</button>
    <button class="btn-secondary" onclick="closeChildModal()">キャンセル</button>
    <button class="btn-danger" id="delete-child-btn" style="display:none" onclick="deleteChild()">削除</button>
  </div>
</div>

<!-- MODAL: 計測 -->
<div class="modal-overlay" id="measure-modal">
  <div class="modal">
    <div class="modal-title" id="measure-modal-title">計測を記録</div>
    <div class="form-group">
      <label class="form-label">計測日</label>
      <input class="form-input" id="f-m-date" type="date">
    </div>
    <div class="form-row">
      <div class="form-group">
        <label class="form-label">身長 (cm)</label>
        <input class="form-input" id="f-m-height" type="number" step="0.1" placeholder="例：105.5">
      </div>
      <div class="form-group">
        <label class="form-label">体重 (kg)</label>
        <input class="form-input" id="f-m-weight" type="number" step="0.1" placeholder="例：18.2">
      </div>
    </div>
    <div class="form-row">
      <div class="form-group">
        <label class="form-label">トップスサイズ</label>
        <select class="form-input" id="f-m-tops">
          <option value="">選択</option>
          <option>70</option><option>80</option><option>90</option>
          <option>95</option><option>100</option><option>110</option>
          <option>120</option><option>130</option><option>140</option><option>150</option>
        </select>
      </div>
      <div class="form-group">
        <label class="form-label">ボトムスサイズ</label>
        <select class="form-input" id="f-m-bottoms">
          <option value="">選択</option>
          <option>70</option><option>80</option><option>90</option>
          <option>95</option><option>100</option><option>110</option>
          <option>120</option><option>130</option><option>140</option><option>150</option>
        </select>
      </div>
    </div>
    <div class="form-row">
      <div class="form-group">
        <label class="form-label">靴サイズ (cm)</label>
        <input class="form-input" id="f-m-shoe" type="number" step="0.5" placeholder="例：16.0">
      </div>
      <div class="form-group"></div>
    </div>
    <div class="form-group">
      <label class="form-label">着用メモ</label>
      <input class="form-input" id="f-m-note" type="text" placeholder="例：少し大きめ、裾折ってる">
    </div>
    <button class="btn-primary" onclick="saveMeasurement()">保存</button>
    <button class="btn-secondary" onclick="closeMeasureModal()">キャンセル</button>
    <button class="btn-danger" id="delete-measure-btn" style="display:none" onclick="deleteMeasurement()">この記録を削除</button>
  </div>
</div>

<div id="toast"></div>

<script>
/*
  ── Supabase テーブル作成SQL（初回のみ実行） ──────────────
  CREATE TABLE size_children (
    id UUID DEFAULT gen_random_uuid() PRIMARY KEY,
    name TEXT NOT NULL,
    birthdate DATE NOT NULL,
    gender TEXT DEFAULT '不明',
    sort_order INTEGER DEFAULT 0,
    created_at TIMESTAMPTZ DEFAULT now()
  );
  CREATE TABLE size_measurements (
    id UUID DEFAULT gen_random_uuid() PRIMARY KEY,
    child_id UUID REFERENCES size_children(id) ON DELETE CASCADE,
    measured_at DATE NOT NULL,
    height_cm NUMERIC(5,1),
    weight_kg NUMERIC(4,1),
    clothing_size TEXT,
    shoe_size_cm NUMERIC(4,1),
    note TEXT DEFAULT '',
    created_at TIMESTAMPTZ DEFAULT now()
  );
  CREATE TABLE size_brand_notes (
    id UUID DEFAULT gen_random_uuid() PRIMARY KEY,
    child_id UUID REFERENCES size_children(id) ON DELETE CASCADE,
    brand_name TEXT NOT NULL,
    category TEXT NOT NULL,
    size_offset INTEGER DEFAULT 0,
    shoe_offset_cm NUMERIC(3,1) DEFAULT 0,
    user_note TEXT DEFAULT '',
    updated_at TIMESTAMPTZ DEFAULT now(),
    UNIQUE(child_id, brand_name, category)
  );
  ALTER TABLE size_children DISABLE ROW LEVEL SECURITY;
  ALTER TABLE size_measurements DISABLE ROW LEVEL SECURITY;
  ALTER TABLE size_brand_notes DISABLE ROW LEVEL SECURITY;
  ────────────────────────────────────────────────────────
*/

const SUPABASE_URL = 'https://ckiszpfcaeoxschkgojd.supabase.co';
const SUPABASE_ANON_KEY = 'sb_publishable_ZWFtAIrfI3hfqwLRC7Af_Q_MyN93Lcr';
const sb = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

// ─── State ────────────────────────────────────
let children = [];
let currentChildId = null;
let measurements = [];
let brandNotes = [];
let editingMeasureId = null;
let editingChildId = null;
let currentTab = 'predict';
let selectedIcon = '🎀';
let selectedColor = '#FF8FAB';
let wardrobe = [];

const CHILD_ICONS = ["🎀","⭐","🐬","🌸","🦊","🐼","🐨","🦁","🐸","🐥","🌈","🍀","🦋","🐰","🐶","🐱","🐻","🍭","🎠","🧸","🌻","🍓","🎈","🦄","🦖","🐳","🏀","⚽","🚗"];
const CHILD_COLORS = ["#FF8FAB","#5B8DEF","#52B788","#FF9B50","#845EF7","#20B2AA","#FF6B6B","#FFAD60"];

// ─── 成長予測 ─────────────────────────────────
// 月あたり成長量(cm) by 月齢
const GROWTH_RATES = [
  [0,3,3.5],[3,6,2.0],[6,12,1.3],
  [12,24,0.95],[24,36,0.75],[36,48,0.60],
  [48,60,0.55],[60,72,0.50],[72,84,0.46],
  [84,96,0.46],[96,108,0.42],[108,120,0.46],
  [120,132,0.55],[132,144,0.58],[144,156,0.45],
  [156,999,0.20],
];

function getGrowthRate(ageM) {
  for (const [s,e,r] of GROWTH_RATES) if (ageM >= s && ageM < e) return r;
  return 0.1;
}

function predictHeight(currentH, currentAgeM, futureAgeM, personalRate = null) {
  if (!currentH || futureAgeM <= currentAgeM) return currentH;
  let h = currentH;
  const steps = Math.round(futureAgeM - currentAgeM);
  for (let i = 0; i < steps; i++) {
    const avgRate = getGrowthRate(currentAgeM + i);
    // 個人ペースがあれば使う（平均との加重平均：近い将来は個人重視、遠い将来は平均に寄せる）
    const weight = personalRate !== null ? Math.max(0, 1 - i / 24) : 0;
    h += personalRate !== null ? personalRate * weight + avgRate * (1 - weight) : avgRate;
  }
  return Math.round(h * 10) / 10;
}

// 過去記録から個人の月間成長ペース(cm/月)を算出
function getPersonalGrowthRate(measurements) {
  const withH = measurements.filter(m => m.height_cm && m.measured_at);
  if (withH.length < 2) return null;
  const newest = withH[0];
  const oldest = withH[withH.length - 1];
  const monthsDiff = (new Date(newest.measured_at).getFullYear() - new Date(oldest.measured_at).getFullYear()) * 12
    + (new Date(newest.measured_at).getMonth() - new Date(oldest.measured_at).getMonth());
  if (monthsDiff < 3) return null; // 3ヶ月未満は信頼性低い
  const rate = (newest.height_cm - oldest.height_cm) / monthsDiff;
  if (rate <= 0 || rate > 3.5) return null; // 異常値は無視
  return Math.round(rate * 100) / 100;
}

function getAgeMonthsNow(birthdate) {
  const b = new Date(birthdate), n = new Date();
  return (n.getFullYear() - b.getFullYear()) * 12 + (n.getMonth() - b.getMonth());
}

function getAgeMonthsAt(birthdate, targetDate) {
  const b = new Date(birthdate), t = new Date(targetDate);
  return (t.getFullYear() - b.getFullYear()) * 12 + (t.getMonth() - b.getMonth());
}

function getClothingSize(h) {
  if (!h) return '?';
  if (h < 75)  return '70';
  if (h < 85)  return '80';
  if (h < 92)  return '90';
  if (h < 98)  return '95';
  if (h < 106) return '100';
  if (h < 116) return '110';
  if (h < 126) return '120';
  if (h < 136) return '130';
  if (h < 146) return '140';
  return '150';
}

function getShoeSize(h) {
  if (!h) return '?';
  const shoe = h * 0.157 + 1.0;
  return (Math.round(shoe * 2) / 2).toFixed(1);
}

function getPredictionTargets() {
  const now = new Date();
  const y = now.getFullYear(), m = now.getMonth();
  const summerYear = m >= 7 ? y + 1 : y;
  const winterYear = m >= 11 ? y + 1 : y;
  const nextSummer = new Date(summerYear, 6, 1);
  const nextWinter = new Date(winterYear, 11, 1);
  const oneYear   = new Date(now); oneYear.setFullYear(y + 1);
  const twoYears  = new Date(now); twoYears.setFullYear(y + 2);
  return [
    { label: '次の夏', dateStr: `${nextSummer.getFullYear()}年${nextSummer.getMonth()+1}月`, date: nextSummer, icon: '☀️', cls: 'summer' },
    { label: '次の冬', dateStr: `${nextWinter.getFullYear()}年${nextWinter.getMonth()+1}月`, date: nextWinter, icon: '❄️', cls: 'winter' },
    { label: '1年後',  dateStr: `${oneYear.getFullYear()}年${oneYear.getMonth()+1}月`,  date: oneYear,   icon: '', cls: 'year1' },
    { label: '2年後',  dateStr: `${twoYears.getFullYear()}年${twoYears.getMonth()+1}月`, date: twoYears,  icon: '', cls: 'year2' },
  ];
}

// ─── Utils ────────────────────────────────────
function fmtDate(d) {
  if (!d) return '';
  const dt = new Date(d);
  return `${dt.getFullYear()}/${String(dt.getMonth()+1).padStart(2,'0')}/${String(dt.getDate()).padStart(2,'0')}`;
}

function getAgeLabel(birthdate) {
  const b = new Date(birthdate), n = new Date();
  const years = n.getFullYear() - b.getFullYear() - (n < new Date(n.getFullYear(), b.getMonth(), b.getDate()) ? 1 : 0);
  const months = getAgeMonthsNow(birthdate) % 12;
  if (years < 1) return `${getAgeMonthsNow(birthdate)}ヶ月`;
  return months === 0 ? `${years}歳` : `${years}歳${months}ヶ月`;
}

function renderPredict() {
  const el = document.getElementById('tab-predict');
  if (measurements.length === 0) {
    el.innerHTML = '<div class="no-data">計測記録がありません。<br>＋ボタンから身長・体重を記録してください。</div>';
    return;
  }
  const child = children.find(c => c.id === currentChildId);
  const latest = measurements[0];
  const curAgeM = getAgeMonthsNow(child.birthdate);
  const targets = getPredictionTargets();

  // 個人成長ペース
  const personalRate = getPersonalGrowthRate(measurements);
  const rateNote = personalRate !== null
    ? `<div style="font-size:.75rem;color:var(--child-color);background:#f0f2ff;padding:6px 12px;border-radius:8px;margin-bottom:10px">📈 この子の実績ペース ${personalRate}cm/月 を反映</div>`
    : measurements.length >= 2
      ? `<div style="font-size:.75rem;color:#aaa;background:#f8f8f8;padding:6px 12px;border-radius:8px;margin-bottom:10px">計測間隔が短いため平均値で予測中</div>`
      : `<div style="font-size:.75rem;color:#aaa;background:#f8f8f8;padding:6px 12px;border-radius:8px;margin-bottom:10px">記録が1件のため平均値で予測中</div>`;

  const looseCm = getUserLooseCm();
  const looseNote = looseCm > 0
    ? `<div style="font-size:.75rem;color:var(--child-color);background:#f0ebff;padding:6px 12px;border-radius:8px;margin-bottom:10px">📏 ゆったり +${looseCm}cm を反映中（ブランドタブで変更）</div>`
    : '';

  // 現在サイズの最低ライン
  const currentTopsIdx    = CLOTHING_SIZES.indexOf(latest.tops_size    || latest.clothing_size || getClothingSize(latest.height_cm));
  const currentBottomsIdx = CLOTHING_SIZES.indexOf(latest.bottoms_size || latest.clothing_size || getClothingSize(latest.height_cm));
  const currentShoe = parseFloat(latest.shoe_size_cm || getShoeSize(latest.height_cm));

  function clampClothing(idx) { return CLOTHING_SIZES[Math.max(currentTopsIdx, Math.min(CLOTHING_SIZES.length-1, idx))]; }
  function clampBottoms(idx) { return CLOTHING_SIZES[Math.max(currentBottomsIdx, Math.min(CLOTHING_SIZES.length-1, idx))]; }
  function clampShoe(val) { return Math.max(currentShoe, val); }

  // 予測カード（ゆったり余裕を身長に加算してサイズ算出）
  const cards = targets.map(t => {
    const futAgeM = getAgeMonthsAt(child.birthdate, t.date);
    const pH = predictHeight(latest.height_cm, curAgeM, futAgeM, personalRate);
    const topsIdx     = CLOTHING_SIZES.indexOf(getClothingSize(pH + looseCm));
    const topsSize    = clampClothing(topsIdx);
    const bottomsSize = clampBottoms(topsIdx);
    const shoeSize    = (Math.round(clampShoe(parseFloat(getShoeSize(pH))) * 2) / 2).toFixed(1);
    const outerSize = clampClothing(topsIdx + 1);
    const ageY = Math.floor(futAgeM / 12);
    const ageM = futAgeM % 12;
    const ageStr = ageY > 0 ? `${ageY}歳${ageM > 0 ? ageM + 'か月' : ''}` : `${ageM}か月`;
    return `
    <div class="predict-card ${t.cls}">
      <div class="predict-label">${t.icon ? t.icon + ' ' : ''}${t.label}</div>
      <div class="predict-date">${t.dateStr}頃・${ageStr}</div>
      <div class="predict-height">身長 約${pH}cm</div>
      <div class="predict-size">
        <span>上 ${topsSize}</span>
        <span>下 ${bottomsSize}</span>
        <span>👟 ${shoeSize}</span>
      </div>
    </div>`;
  }).join('');


  // SIZE_TABLE 参考（現在の有効サイズをハイライト）
  const activeSizeLabel = getClothingSize(latest.height_cm + looseCm);
  const sizeTableRows = SIZE_TABLE.map(s =>
    `<tr${s.size === activeSizeLabel ? ' style="background:#f0ebff;font-weight:700"' : ''}>
      <td class="td-size">${s.size}</td>
      <td>${s.tate}</td>
      <td>${s.haba}</td>
    </tr>`
  ).join('');

  el.innerHTML = `
    ${rateNote}
    ${looseNote}
    <div class="predict-grid">${cards}</div>
    <details style="background:#fff;border-radius:14px;padding:14px;box-shadow:0 2px 6px rgba(0,0,0,.06);margin-top:4px">
      <summary style="font-size:.88rem;font-weight:700;color:#555;cursor:pointer;list-style:none;display:flex;justify-content:space-between;align-items:center">
        📐 子供服 標準サイズ目安表 <span style="color:#bbb;font-weight:400;font-size:.78rem">▾</span>
      </summary>
      <div style="margin-top:10px">
        <div class="scroll-table">
          <table>
            <thead><tr><th>サイズ</th><th>着丈目安(cm)</th><th>身幅目安(cm)</th></tr></thead>
            <tbody>${sizeTableRows}</tbody>
          </table>
        </div>
        <p style="font-size:.72rem;color:#aaa;margin-top:8px;line-height:1.6">※メーカー・商品により異なります。参考値です。</p>
      </div>
    </details>`;
}

function getBrandVisible(name) {
  const v = localStorage.getItem('bv_' + name);
  return v === null ? true : v === '1';
}
function setBrandVisible(name, val) {
  localStorage.setItem('bv_' + name, val ? '1' : '0');
}
function toggleBrandVisible(name) {
  const newVal = !getBrandVisible(name);
  setBrandVisible(name, newVal);
  renderBrands();
  renderPredict();
}

const SEASON_CATS = {
  '夏': ['肌着', 'トップス', 'ボトムス'],
  '冬': ['肌着', 'トップス', 'ボトムス'],
};

function getSeasons() {
  const now = new Date();
  const year = now.getFullYear();
  const month = now.getMonth() + 1;
  const isSummerFirst = month >= 3 && month <= 8;
  const periods = [];
  if (isSummerFirst) {
    periods.push({ label: '今年の夏',    key: `${year}夏`,   season: '夏' });
    periods.push({ label: '今年の冬',    key: `${year}冬`,   season: '冬' });
    periods.push({ label: '来年の夏',    key: `${year+1}夏`, season: '夏' });
    periods.push({ label: '来年の冬',    key: `${year+1}冬`, season: '冬' });
    periods.push({ label: '再来年の夏',  key: `${year+2}夏`, season: '夏' });
    periods.push({ label: '再来年の冬',  key: `${year+2}冬`, season: '冬' });
  } else {
    periods.push({ label: '今年の冬',    key: `${year}冬`,   season: '冬' });
    periods.push({ label: '来年の夏',    key: `${year+1}夏`, season: '夏' });
    periods.push({ label: '来年の冬',    key: `${year+1}冬`, season: '冬' });
    periods.push({ label: '再来年の夏',  key: `${year+2}夏`, season: '夏' });
    periods.push({ label: '再来年の冬',  key: `${year+2}冬`, season: '冬' });
    periods.push({ label: `${year+3}年の夏`, key: `${year+3}夏`, season: '夏' });
  }
  return periods;
}

function renderCloset() {
  const el = document.getElementById('tab-closet');
  const periods = getSeasons();
  const child = children.find(c => c.id === currentChildId);
  let html = '<p style="font-size:.8rem;color:#aaa;margin-bottom:16px;line-height:1.6">着る時期ごとに枚数とメモを記録できます。</p>';

  periods.forEach(period => {
    const cats = SEASON_CATS[period.season];
    const isSummer = period.season === '夏';
    const bg = isSummer ? '#fff8f0' : '#f0f4ff';
    const emoji = isSummer ? '☀️' : '❄️';
    const border = isSummer ? '#ffe0b2' : '#c5cae9';
    const memoItem = wardrobe.find(w => w.category === '_memo' && w.size === period.key);
    const memoText = memoItem ? (memoItem.memo || '') : '';

    // 年と年齢を計算
    const periodYear = parseInt(period.key);
    const seasonMonth = isSummer ? 7 : 12;
    let ageSub = '';
    if (child && child.birthdate) {
      const totalM = getAgeMonthsAt(child.birthdate, `${periodYear}-${String(seasonMonth).padStart(2,'0')}-01`);
      if (totalM >= 0) {
        const y = Math.floor(totalM / 12);
        const m = totalM % 12;
        ageSub = y > 0 ? `${y}歳${m > 0 ? m + 'か月' : ''}` : `${m}か月`;
      }
    }
    const titleSub = `<span style="font-size:.75rem;color:#888;font-weight:400;margin-left:6px">${periodYear}年${ageSub ? '・' + ageSub : ''}</span>`;

    html += `<div style="background:${bg};border:1px solid ${border};border-radius:14px;padding:14px 16px;margin-bottom:16px">`;
    html += `<div style="font-weight:700;font-size:.95rem;color:#2d3748;margin-bottom:12px">${emoji} ${period.label}${titleSub}</div>`;

    cats.forEach(cat => {
      const item = wardrobe.find(w => w.category === cat && w.size === period.key);
      const count = item ? item.count : 0;
      html += `
        <div style="display:flex;align-items:center;justify-content:space-between;padding:7px 0;border-bottom:1px solid rgba(0,0,0,.06)">
          <span style="font-size:.88rem;color:#555;min-width:70px">${cat}</span>
          <div style="display:flex;align-items:center;gap:10px">
            <button class="closet-chip-btn" onclick="adjWardrobeNew('${cat}','${period.key}',-1)">－</button>
            <span style="min-width:24px;text-align:center;font-size:.95rem;font-weight:700;color:var(--child-color)">${count}</span>
            <button class="closet-chip-btn" onclick="adjWardrobeNew('${cat}','${period.key}',1)">＋</button>
          </div>
        </div>`;
    });

    html += `
      <div style="margin-top:12px">
        <textarea
          id="memo-${period.key}"
          style="width:100%;min-height:100px;padding:10px 12px;border:1px solid ${border};border-radius:8px;font-size:.85rem;font-family:inherit;color:#444;resize:vertical;background:#fff;outline:none;box-sizing:border-box;line-height:1.7"
          placeholder=""
          onblur="savePeriodMemo('${period.key}', this.value)"
        >${memoText.replace(/</g,'&lt;').replace(/>/g,'&gt;')}</textarea>
      </div>`;

    html += '</div>';
  });

  el.innerHTML = html;
}

async function adjWardrobeNew(category, period, delta) {
  const item = wardrobe.find(w => w.category === category && w.size === period);
  const newCount = Math.max(0, (item ? item.count : 0) + delta);
  if (item) {
    await sb.from('size_wardrobe').update({ count: newCount, updated_at: new Date().toISOString() }).eq('id', item.id);
    item.count = newCount;
  } else if (newCount > 0) {
    const { data } = await sb.from('size_wardrobe').insert({ child_id: currentChildId, category, size: period, count: newCount, memo: '' }).select().single();
    if (data) wardrobe.push(data);
  }
  renderCloset();
}

async function savePeriodMemo(period, memo) {
  const item = wardrobe.find(w => w.category === '_memo' && w.size === period);
  if (item) {
    await sb.from('size_wardrobe').update({ memo, updated_at: new Date().toISOString() }).eq('id', item.id);
    item.memo = memo;
  } else if (memo.trim()) {
    const { data } = await sb.from('size_wardrobe').insert({ child_id: currentChildId, category: '_memo', size: period, count: 0, memo }).select().single();
    if (data) wardrobe.push(data);
  }
}

function buildBrandEditRow(brandName, category, defaultOffset, defaultNote, isShoe) {
  const stored = brandNotes.find(n => n.brand_name === brandName && n.category === category);
  const offset = stored ? (isShoe ? parseFloat(stored.shoe_offset_cm || 0) : stored.size_offset) : defaultOffset;
  const userNote = stored ? stored.user_note : defaultNote;
  const safeId = `b-${category}-${brandName.replace(/[^a-zA-Z0-9]/g, '_')}`;
  const offsetLabel = isShoe ? 'サイズ調整 (cm)' : 'サイズ調整 (段階)';
  const step = isShoe ? 0.5 : 1;
  const dispOffset = offset >= 0 ? `+${offset}` : `${offset}`;
  const visible = getBrandVisible(brandName);

  return `
  <div class="brand-edit-row" style="opacity:${visible ? 1 : 0.5}">
    <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:10px">
      <div class="brand-edit-name" style="margin-bottom:0">${brandName}</div>
      <label style="display:flex;align-items:center;gap:6px;cursor:pointer;font-size:.82rem;color:${visible?'var(--child-color)':'#aaa'}">
        <input type="checkbox" ${visible?'checked':''} onchange="toggleBrandVisible('${brandName}')" style="width:18px;height:18px;accent-color:var(--child-color);cursor:pointer">
        予測に表示
      </label>
    </div>
    <div class="offset-control">
      <span class="offset-label">${offsetLabel}</span>
      <button class="offset-btn" onclick="adjOffset('${safeId}', -${step}, ${isShoe})">−</button>
      <span class="offset-val" id="${safeId}-val">${dispOffset}</span>
      <input type="hidden" id="${safeId}-input" value="${offset}">
      <button class="offset-btn" onclick="adjOffset('${safeId}', ${step}, ${isShoe})">＋</button>
    </div>
    <div class="form-group">
      <input class="form-input" id="${safeId}-note" type="text" value="${userNote.replace(/"/g,'&quot;')}" placeholder="メモ（例：丈が長め）" style="font-size:.85rem;padding:8px 10px">
    </div>
    <button class="save-brand-btn" onclick="saveBrandNote('${brandName}','${category}',${isShoe})">保存</button>
  </div>`;
}

function adjOffset(safeId, step, isShoe) {
  const input = document.getElementById(`${safeId}-input`);
  const val = Math.round((parseFloat(input.value) + step) * 10) / 10;
  input.value = val;
  document.getElementById(`${safeId}-val`).textContent = val >= 0 ? `+${val}` : `${val}`;
}

async function saveBrandNote(brandName, category, isShoe) {
  const safeId = `b-${category}-${brandName.replace(/[^a-zA-Z0-9]/g, '_')}`;
  const offset = parseFloat(document.getElementById(`${safeId}-input`).value);
  const noteText = document.getElementById(`${safeId}-note`).value;
  const existing = brandNotes.find(n => n.brand_name === brandName && n.category === category);

  const record = {
    child_id: currentChildId,
    brand_name: brandName,
    category,
    size_offset: isShoe ? 0 : Math.round(offset),
    shoe_offset_cm: isShoe ? offset : 0,
    user_note: noteText,
    updated_at: new Date().toISOString(),
  };

  let error;
  if (existing) {
    ({ error } = await sb.from('size_brand_notes').update(record).eq('id', existing.id));
  } else {
    ({ error } = await sb.from('size_brand_notes').insert(record));
  }

  if (error) { showToast('保存に失敗しました'); return; }
  showToast('保存しました');
  brandNotes = await fetchBrandNotes(currentChildId);
}

async function saveChild() {
  const name = document.getElementById('f-child-name').value.trim();
  const by = document.getElementById('f-child-birth-y').value;
  const bm = document.getElementById('f-child-birth-m').value;
  const bd = document.getElementById('f-child-birth-d').value;
  const birthdate = (by && bm && bd) ? `${by}-${String(bm).padStart(2,'0')}-${String(bd).padStart(2,'0')}` : '';
  const gender = document.getElementById('f-child-gender').value;
  if (!name || !birthdate) { showToast('名前と生年月日を入力してください'); return; }

  const { data: { user } } = await sb.auth.getUser();
  const record = { name, birthdate, gender, icon: selectedIcon, color: selectedColor };
  if (!editingChildId) { record.sort_order = children.length; record.user_id = user.id; }

  let error;
  if (editingChildId) {
    ({ error } = await sb.from('size_children').update(record).eq('id', editingChildId));
  } else {
    ({ error } = await sb.from('size_children').insert(record));
  }
  if (error) { showToast('エラー: ' + (error.message || JSON.stringify(error))); console.error(error); return; }
  closeChildModal();
  children = await fetchChildren();
  renderHome();
  showToast('保存しました');
  if (editingChildId) document.getElementById('child-hdr-name').textContent = `${selectedIcon} ${name}`;
}

async function deleteChild() {

  closeChildModal();
  children = await fetchChildren();

  renderHome();
  showToast('削除しました');
}

async function signInWithGoogle() {
  await sb.auth.signInWithOAuth({
    provider: 'google',
    options: { redirectTo: 'https://mihokeiridaiko.github.io/kids-size/' }
  });
}

async function signOut() {
  await sb.auth.signOut();
  document.getElementById('screen-home').style.display = 'none';
  document.getElementById('screen-child').style.display = 'none';
  document.getElementById('screen-login').style.display = 'flex';
}

async function init() {
  const { data: { session } } = await sb.auth.getSession();
  document.getElementById('loading').style.display = 'none';
  if (!session) {
    document.getElementById('screen-login').style.display = 'flex';
    return;
  }
  initBirthSelects();
  children = await fetchChildren();
  showHome();
  renderHome();
}

sb.auth.onAuthStateChange((event, session) => {
  if (event === 'SIGNED_IN') {
    document.getElementById('screen-login').style.display = 'none';
    initBirthSelects();
    fetchChildren().then(data => { children = data; showHome(); renderHome(); });
  }
});

init();
</script>
</body>
</html>
